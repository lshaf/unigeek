[env:m5sticks3]
board = m5sticks3
board_build.partitions = firmware/partitions_8mb.csv

build_src_filter = ${env.build_src_filter} +<../boards/m5sticks3>
build_flags =
	${env.build_flags}
	-Ifirmware/boards/m5sticks3
	-Ifirmware/boards/m5sticks3/lib

lib_deps =
	${env.lib_deps}

; ── Windows-FIDO experiment env ──────────────────────────────────────────
; Same hardware as m5sticks3 but built against the m5sticks3_winfido board
; variant, which sets ARDUINO_USB_CDC_ON_BOOT=0 — the USB device presents
; ONLY the FIDO HID interface (no CDC). Matches what working FIDO keys do
; on Windows. WebAuthn debug already routes to Serial1 on Grove pins, so
; losing HWCDC here costs nothing for the WebAuthn flow.
;
; Build:    pio run -e m5sticks3_winfido -t upload
; Test on Windows: open WebAuthn screen, plug in, then chrome://settings/securityKeys
; See firmware/src/utils/webauthn/WINDOWS-COMPAT.md for the full checklist.
[env:m5sticks3_winfido]
extends = env:m5sticks3
board = m5sticks3_winfido
