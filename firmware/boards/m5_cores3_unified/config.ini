[env:m5_cores3_unified]
board = m5_cores3
board_build.partitions = firmware/partitions_16mb.csv

build_src_filter =
	${env.build_src_filter}
	+<../boards/m5_cores3_unified>

build_flags =
	${env.build_flags}
	-Ifirmware/boards/m5_cores3_unified
	-DDISPLAY_BACKEND_M5GFX

lib_deps =
	${env.lib_deps}
	m5stack/M5Unified

lib_ignore =
	TFT_eSPI
