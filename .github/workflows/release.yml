name: Build and Release

on:
  release:
    types: [created]
  push:
    tags:
      - '[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - t_display_16mb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'firmware/boards/**') }}
          restore-keys: pio-${{ matrix.env }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      - name: Rename binary
        run: cp unigeek-latest.bin unigeek-${{ matrix.env }}.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unigeek-${{ matrix.env }}
          path: unigeek-${{ matrix.env }}.bin

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: unigeek-${{ matrix.env }}.bin
